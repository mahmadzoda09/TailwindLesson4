<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body>
    <header class="flex max-w-300 m-auto p-[20px] justify-between items-center">
      <img src="src/Logo.png" alt="" />
      <nav class="hidden lg:flex lg:gap-[50px]">
        <div>
          <p class="text-[#69B99D] font-bold">Início</p>
          <hr class="text-[#69B99D] font-black" />
        </div>
        <p>Sobre</p>
        <p>Serviços</p>
        <p>Depoimentos</p>
        <p>Contato</p>
      </nav>
      <p class="lg:hidden text-[#69B99D] font-bold">☰</p>
    </header>
    <hr class="text-[#E4E4E4]" />
    <main>
      <section
        class="flex flex-col-reverse lg:flex-row max-w-300 m-auto p-[20px] justify-between items-center gap-[50px] lg:gap-[125px]"
      >
        <aside
          class="flex flex-col gap-[20px] items-start text-center lg:text-start"
        >
          <h1 class="text-[#0F241D] text-[36px] font-bold">
            Saúde natural para os seus cabelos
          </h1>
          <p class="text-[#767676] text-[18px] font-normal">
            Um salão exclusivo em São Paulo, especializado em tratamentos
            naturais.
          </p>
          <button
            class="bg-[#69B99D] text-white p-[10px_25px] rounded-[10px] self-center lg:self-start"
          >
            Agendar um horário
          </button>
        </aside>
        <img src="src/Img.png" alt="" />
      </section>
    </main>
  </body>
</html>
